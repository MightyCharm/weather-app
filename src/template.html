<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <div class="header-text">
          <h1>Weather App</h1>
          <p>Odin Project [2026]</p>
        </div>
        <div class="header-btns">
          <button id="btn-temp" class="btn-temp-unit" title="Change Unit">
            °C
          </button>
          <button id="btn-color" class="btn-color-theme" title="Change theme">
            ☾
          </button>
        </div>
      </header>
      <main class="page-main">
        <section class="section-form">
          <form class="form-element" method="get">
            <input
              id="search"
              class="input-search"
              type="text"
              name="user-search"
              placeholder="Ort eingeben..."
              required
            />

            <button id="search-btn" class="submit-btn" type="submit">
              Suche
            </button>
          </form>
        </section>
        <section class="section-current">
          <div class="div-current-location-date">
            <p id="address" class="resolved-address"></p>
            <p id="date-time" class="current-date-time">
              <span id="data-date"></span><span id="current-time"></span>
            </p>
          </div>

          <div class="div-current-temperature">
            <div class="current-temp-icon">
              <div class="current-temp-sign">
                <span id="data-temp" class="span-current-temp"></span>
                <span class="span-current-temp-unit">°C</span>
              </div>
              <img
                id="data-icon"
                class="current-weather-icon"
                alt="must be dynamic, add later"
              />
            </div>
            <p id="data-conditions" class="current-weather-conditions"></p>
          </div>

          <div class="div-current-extra-weather-data">
            <div class="wind-group">
              <i class="extra-info-icon fa-solid fa-wind"></i>
              <span class="wind-description">Windgeschwindigkeit</span>
              <span id="data-wind" class="current-wind"></span>
            </div>

            <div class="humidity-group">
              <i class="extra-info-icon fa-solid fa-droplet"></i>
              <span class="humidity-description">Luftfeuchtigkeit</span>
              <span id="data-humidity" class="current-humidity">humidity</span>
            </div>

            <div class="feel-temp-group">
              <i class="extra-info-icon fa-solid fa-temperature-high"></i>
              <span class="feelslike-description">Gefühlte Temperatur</span>
              <span id="data-feelslike" class="current-feel-temp"></span>
            </div>
          </div>

          <div class="div-current-description">
            <p id="data-description"></p>
          </div>
        </section>
        <section class="section-forecast">
          <ul class="ul-forecast">
            <li class="card-forecast">
              <p class="data-forecast-weekday"></p>
              <img class="data-forecast-icon" />
              <p class="data-forecast-temp"></p>
              <p class="data-forecast-conditions"></p>
            </li>
            <li class="card-forecast">
              <p class="data-forecast-weekday"></p>
              <img class="data-forecast-icon" />
              <p class="data-forecast-temp"></p>
              <p class="data-forecast-conditions"></p>
            </li>
            <li class="card-forecast">
              <p class="data-forecast-weekday"></p>
              <img class="data-forecast-icon" />
              <p class="data-forecast-temp"></p>
              <p class="data-forecast-conditions"></p>
            </li>
            <li class="card-forecast">
              <p class="data-forecast-weekday"></p>
              <img class="data-forecast-icon" />
              <p class="data-forecast-temp"></p>
              <p class="data-forecast-conditions"></p>
            </li>
            <li class="card-forecast">
              <p class="data-forecast-weekday"></p>
              <img class="data-forecast-icon" />
              <p class="data-forecast-temp"></p>
              <p class="data-forecast-conditions"></p>
            </li>
            <li class="card-forecast">
              <p class="data-forecast-weekday"></p>
              <img class="data-forecast-icon" />
              <p class="data-forecast-temp"></p>
              <p class="data-forecast-conditions"></p>
            </li>
          </ul>
        </section>
        <section class="section-extra-information">
          <p id="data-fetched-time" class="time-data-fetched"></p>
        </section>
      </main>
      <footer class="page-footer" aria-label="Social media links">
        <h2 class="footer-header">About me</h2>
        <ul class="footer-ul">
          <li class="list-item">
            <a
              class="social-link"
              href="https://github.com/MightyCharm"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Follow on Github"
              ><i class="fab fa-github fa-2x"></i
            ></a>
          </li>
          <li class="list-item">
            <a
              class="social-link"
              href="https://www.freecodecamp.org/MightyCharm"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Follow on freeCodeCamp"
              ><i class="fab fa-free-code-camp fa-2x"></i
            ></a>
          </li>
          <li class="list-item">
            <a
              class="social-link"
              href="https://www.linkedin.com/in/michael-m%C3%BCller-pforzheim"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Follow on Linkedin"
              ><i class="fab fa-linkedin fa-2x"></i>
            </a>
          </li>
          <li class="list-item">
            <a
              class="social-link"
              href="https://x.com/Michael_1800"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Follow on X"
              ><i class="fab fa-x-twitter fa-2x"></i
            ></a>
          </li>

          <li class="list-item">
            <a
              class="link-sololearn"
              href="https://www.sololearn.com/de/profile/25075522"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Follow on Sololearn"
              ><img
                class="logo-sololearn"
                src="./images/sololearn.svg"
                alt="Sololearn logo"
            /></a>
          </li>
        </ul>
      </footer>
    </div>
  </body>
</html>
