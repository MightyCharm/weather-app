<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header class="page-header">
      <div class="header-main-text">
        <h1>Weather App</h1>
        <p>Odin Project [2026]</p>
      </div>
    </header>
    <main class="page-main">
      <div class="container">
        <section class="section-form">
          <form class="form-element" method="get">
            <label class="input-search-label" for="search"
              >Enter Location</label
            >
            <input
              id="search"
              class="input-search"
              type="text"
              name="user-search"
              required
            />

            <button class="submit-btn" type="submit">SEARCH</button>
          </form>
        </section>
        <section class="section-current">
          <div class="div-current-location-info">
            <h2 id="data-address" class="address"></h2>
          </div>
          <div class="card-current">
            <div class="div-current-date">
              <span id="data-date" class="current-span-date"></span>
              <span id="data-datetime" class="current-span-time"
                >12:30:21 pm</span
              >
              <span id="data-weekday" class="current-span-day"></span>
            </div>

            <div class="div-current-img">
              <img
                id="data-icon"
                class="current-weather-icon"
                alt="a sun almost totally covered by two clouds"
              />
              <p id="data-conditions" class="current-weather-conditions"></p>
            </div>

            <div class="div-current-temperature">
              <div class="temp-group">
                <span class="temp-description">Temperature</span>
                <span id="data-temp" class="current-temp"></span>
              </div>
              <div class="feel-temp-group">
                <span class="feelslike-description">Feels like:</span>
                <span id="data-feelslike" class="current-feel-temp"></span>
              </div>
            </div>

            <div class="div-current-wind-humidity">
              <div class="wind-group">
                <span class="wind-description">Windspeed</span>
                <span id="data-wind" class="current-wind"></span>
              </div>

              <div class="humidity-group">
                <span class="humidity-description">Humidity</span>
                <span id="data-humidity" class="current-humidity"
                  >humidity</span
                >
              </div>
            </div>

            <div class="div-current-description">
              <p id="data-description"></p>
            </div>
          </div>
        </section>
      </div>
    </main>
    <footer class="page-footer" aria-label="Social media links">
      <h2 class="footer-header">About me</h2>
      <ul class="footer-ul">
        <li class="list-item">
          <a
            class="social-link"
            href="https://github.com/MightyCharm"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Follow on Github"
            ><i class="fab fa-github fa-2x"></i
          ></a>
        </li>
        <li class="list-item">
          <a
            class="social-link"
            href="https://www.freecodecamp.org/MightyCharm"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Follow on freeCodeCamp"
            ><i class="fab fa-free-code-camp fa-2x"></i
          ></a>
        </li>
        <li class="list-item">
          <a
            class="social-link"
            href="https://www.linkedin.com/in/michael-m%C3%BCller-pforzheim"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Follow on Linkedin"
            ><i class="fab fa-linkedin fa-2x"></i>
          </a>
        </li>
        <li class="list-item">
          <a
            class="social-link"
            href="https://x.com/Michael_1800"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Follow on X"
            ><i class="fab fa-x-twitter fa-2x"></i
          ></a>
        </li>

        <li class="list-item">
          <a
            class="link-sololearn"
            href="https://www.sololearn.com/de/profile/25075522"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Follow on Sololearn"
            ><img
              class="logo-sololearn"
              src="./images/sololearn.svg"
              alt="Sololearn logo"
          /></a>
        </li>
      </ul>
    </footer>
  </body>
</html>
